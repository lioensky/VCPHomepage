  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "VCP Neon Striker",
      "alternateName": "VCP Neon Runtime Survivor",
      "url": "https://www.vcptoolbox.com/vcp-neon-game/",
      "description": "VCP Neon Striker 是 VCP-OS 官方霓虹弹幕生存小游戏，使用 HTML Canvas 与原生 JavaScript 实现，提供自动射击、走位生存、三选一构筑、融合技能和 8bit WebAudio 音效。",
      "applicationCategory": "Game",
      "gamePlatform": "Web Browser",

<body>
  <main id="game-shell">
    <canvas id="game-canvas" aria-label="VCP Neon Runtime Survivor 游戏画布"></canvas>

    <section id="start-screen" class="overlay active">
      <div class="panel hero-panel">
        <p class="eyebrow">VCP GAME CENTER / PHASE 1 DEMO</p>
        <h1>VCP: Neon Runtime Survivor</h1>
        <p class="subtitle">霓虹运行时 · 上下文弹幕生存</p>
        <p class="desc">
          自动射击，专心走位。吞经验，三选一构筑，打爆失控上下文。
          没有局外成长，只有每局 3-10 分钟的随机快乐。
        </p>
        <div class="control-grid">
          <span><b>移动</b> WASD / 方向键</span>
          <span><b>鼠标</b> 指向射击偏好</span>
          <span><b>暂停</b> Space / P</span>
          <span><b>目标</b> 活得久，打得爽</span>
        </div>
        <div class="button-row">
          <button id="start-button" class="primary-button">启动 Runtime</button>
          <button id="sound-button" class="ghost-button" type="button">声音 ON</button>
        </div>
      </div>
    </section>

    <section id="level-screen" class="overlay">
      <div class="panel level-panel">
        <p class="eyebrow">RUNTIME UPGRADE</p>
        <h2>选择一个 VCP 模块挂载</h2>
        <div id="upgrade-options" class="upgrade-options"></div>
      </div>
    </section>

    <section id="game-over-screen" class="overlay">
      <div class="panel end-panel">
        <p class="eyebrow">RUNTIME TERMINATED</p>
        <h2>本轮上下文已归档</h2>
        <div id="result-lines" class="result-lines"></div>
        <button id="restart-button" class="primary-button">再跑一局</button>
      </div>
    </section>

    <aside id="hud">
      <div class="hud-row">
        <div>
          <span class="label">TIME</span>
          <strong id="hud-time">00:00</strong>
        </div>
        <div>
          <span class="label">KILLS</span>
          <strong id="hud-kills">0</strong>
        </div>
        <div>
          <span class="label">LEVEL</span>
          <strong id="hud-level">1</strong>
        </div>
      </div>
      <div class="bar-frame">
        <div id="hp-bar" class="bar hp"></div>
      </div>
      <div class="bar-frame">
        <div id="xp-bar" class="bar xp"></div>
      </div>
      <div id="weapon-list" class="weapon-list"></div>
    </aside>

    <aside id="nova-widget">
      <img class="nova-face" src="https://raw.githubusercontent.com/lioensky/VCPToolBox/refs/heads/main/image/Nova%E8%A1%A8%E6%83%85%E5%8C%85/%E7%96%AF%E7%8B%82%E5%90%90%E6%A7%BD.png" alt="Nova 疯狂吐槽表情包头像" loading="lazy" />
      <p id="nova-line">Nova: 别脸接弹幕，除非你想测试容灾。</p>
    </aside>
  </main>

  <script type="module" src="/vcp-neon-game/js/main.js"></script>
</body>
</html>
